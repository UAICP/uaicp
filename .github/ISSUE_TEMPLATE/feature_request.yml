name: Feature Request
description: Propose a new capability or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Compatibility and Adoption Impact
    validations:
      required: true
